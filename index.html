<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tutor - เรียนพิเศษ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="chat-header">
  <h1>tutor<span>.</span></h1>
  <button id="newChatBtn" title="เริ่มใหม่">＋</button>
  <span id="timerDisplay"></span>
</div>

<div id="chatContainer"></div>


<div class="input-bar">
  <div class="input-wrap">
    <div class="image-preview-bar" id="imagePreviewBar">
      <img id="previewThumb" src="" alt="">
      <span id="previewName"></span>
      <button class="remove-img" id="removeImgBtn">✕</button>
    </div>
    <div class="input-row">
      <button id="fileBtn">📷</button>
      <input type="text" id="questionInput" placeholder="พิมพ์..." autocomplete="off">
      <button id="sendBtn">➤</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none">
</div>

<div id="stealthOverlay">
  <div class="icon">📝</div>
  <div class="label">Tutor</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
