<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tutor - เรียนพิเศษ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="chat-header">
  <h1 id="menuToggle">tutor<span>.</span></h1>
  <button id="newChatBtn" class="header-btn" title="เริ่มใหม่">＋</button>
  <button id="clearHistoryBtn" class="header-btn" title="ลบประวัติ">🗑️</button>
</div>
<div id="historyPanel">
  <div class="panel-header">
    <span>ประวัติคำถาม</span>
    <button id="closePanel">✕</button>
  </div>
  <div id="historyList"></div>
</div>

<div id="chatContainer"></div>


<div class="input-bar">
  <div class="input-wrap">
    <div class="image-preview-bar" id="imagePreviewBar">
      <img id="previewThumb" src="" alt="">
      <span id="previewName"></span>
      <button class="remove-img" id="removeImgBtn">✕</button>
    </div>
    <div class="input-row">
      <label id="fileBtn" tabindex="0">📷
        <input type="file" id="fileInput" accept="image/*,application/pdf">
      </label>
      <input type="text" id="questionInput" placeholder="พิมพ์คำถาม หรืออัปโหลดรูปเพื่อเรียน..." autocomplete="off">
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>

<div id="videoOverlay">
  <video id="overlayVideo" playsinline preload="auto">
    <source src="videos/video.mp4" type="video/mp4">
  </video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
